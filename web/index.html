<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dIAna — agente</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        background: #0f1419;
        color: #e7ecf1;
      }
      body {
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }
      textarea {
        width: 100%;
        min-height: 6rem;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid #2a3544;
        background: #1a2332;
        color: inherit;
        resize: vertical;
      }
      button {
        margin-top: 0.75rem;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #out {
        margin-top: 1.5rem;
        padding: 1rem;
        border-radius: 8px;
        background: #1a2332;
        border: 1px solid #2a3544;
        white-space: pre-wrap;
      }
      .err {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <h1>dIAna — chat (API local)</h1>
    <p>Escribe un mensaje y envíalo al servidor. La clave de OpenRouter no sale del backend.</p>
    <textarea id="msg" placeholder="Tu mensaje…"></textarea>
    <br />
    <button type="button" id="send">Enviar</button>
    <div id="out" hidden></div>

    <script>
      const out = document.getElementById("out");
      const send = document.getElementById("send");
      const msg = document.getElementById("msg");

      send.addEventListener("click", async () => {
        const input = msg.value.trim();
        if (!input) return;
        send.disabled = true;
        out.hidden = false;
        out.textContent = "…";
        out.classList.remove("err");
        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || r.statusText);
          out.textContent = data.output ?? "";
        } catch (e) {
          out.classList.add("err");
          out.textContent = e instanceof Error ? e.message : String(e);
        } finally {
          send.disabled = false;
        }
      });
    </script>
  </body>
</html>
